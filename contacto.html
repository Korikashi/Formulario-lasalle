<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - Universidad de La Salle</title>

<!-- Conectar con el CSS del proyecto -->
<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<h2>Formulario de Contacto - Universidad de La Salle</h2>

<!-- 
Formulario que enviará los datos al archivo enviar.php
El método POST se usa para enviar datos al servidor
-->

<form action="enviar.php" method="POST">

<label>Nombre</label><br>
<input type="text" name="nombre" required>
<br><br>

<label>Apellido</label><br>
<input type="text" name="apellido" required>
<br><br>

<label>Correo electrónico</label><br>
<input type="email" name="email" required>
<br><br>

<label>Teléfono</label><br>
<input type="tel" name="telefono">
<br><br>

<label>Programa de interés</label><br>
<select name="programa">
<option>Ingeniería de Software</option>
<option>Ingeniería de Alimentos</option>
<option>Ingeniería Civil</option>
<option>Ingeniería Electrica</option>
</select>
<br><br>

<label>Asunto</label><br>
<input type="text" name="asunto">
<br><br>

<label>Mensaje</label><br>
<textarea name="mensaje" rows="5"></textarea>
<br><br>

<button type="submit">Enviar mensaje</button>

</form>

<script src="js/validar.js"></script>

<!-- Modal de éxito -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm mx-4 text-center">
        <div class="text-5xl mb-4">✅</div>
        <h2 class="text-xl font-bold text-lasalle-blue font-display mb-2">¡Mensaje enviado!</h2>
        <p class="text-lasalle-gray text-sm mb-6">Nos pondremos en contacto contigo pronto.</p>
        <div class="flex flex-col gap-3">
            <button onclick="cerrarModal()"
                class="bg-lasalle-gold text-lasalle-blue font-bold px-6 py-2 rounded-full hover:brightness-110 transition">
                Aceptar
            </button>
            <a href="index.html"
                class="bg-lasalle-blue text-white font-bold px-6 py-2 rounded-full hover:bg-blue-900 transition">
                Volver a inicio
            </a>
        </div>
    </div>
</div>

</body>
</html>
